services:
  postgres:
    image: postgres:17-alpine
    container_name: fiolin-one-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiolin_one}
      POSTGRES_USER: ${POSTGRES_USER:-fiolin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fiolin} -d ${POSTGRES_DB:-fiolin_one}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/src/FiolinOne.Api/Dockerfile
    container_name: fiolin-one-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-fiolin_one};Username=${POSTGRES_USER:-fiolin};Password=${POSTGRES_PASSWORD:-change_me}
      Jwt__Issuer: ${JWT_ISSUER:-FIOLIN.ONE}
      Jwt__Audience: ${JWT_AUDIENCE:-FIOLIN.ONE.Client}
      Jwt__Secret: ${JWT_SECRET:-change_this_secret_to_at_least_32_characters}
    ports:
      - "${API_HTTP_PORT:-5000}:8080"

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    container_name: fiolin-one-frontend
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres_data:
